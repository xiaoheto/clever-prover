# @package _global_
defaults:
  - override hydra/job_logging: 'disabled'

task_type: SPEC_ISOMORPHISM
log_dir: ".logs/eval_structured_spec_few_shot_proof_smoke"
exp_name: "structured_spec_few_shot_proof_smoke"
spec_generation_strategy: "IsoGenerator"
problems_to_solve: [0, 1, 2]
k: 1
timeout_in_secs: 120
params:
  proof_dump_file_path: "proofs.txt"
  num_spec_samples: 2
  num_proof_plan_samples: 2
  uses_copra_prover: false
  spec_prompt_settings:
    system_prompt_path: "src/clever_prover/prompts/structured_spec/system/StructuredSpecGeneration.md"
    example_prompt_path: "src/clever_prover/prompts/structured_spec/examples/StructuredSpecGeneration.md"
    max_tokens_per_action: 6000
    max_history_messages: 0
    end_tokens: ["[END]"]
  spec_model_settings:
    model_name: "vllm:gpt-5.4-mini"
    secret_path: "./secret_template.json"
    temperature: 0.6
  prover_prompt_settings:
    system_prompt_path: "src/clever_prover/prompts/baselines/system/FewShotSpecProofGeneration.md"
    example_prompt_path: "src/clever_prover/prompts/baselines/examples/FewShotSpecProofGeneration.md"
    max_tokens_per_action: 6000
    max_history_messages: 0
    end_tokens: ["[END]"]
  prover_model_settings:
    model_name: "vllm:gpt-5.4-mini"
    secret_path: "./secret_template.json"
    temperature: 0.8
  proof_planner_prompt_settings: null
  proof_planner_model_settings: null
  spec_planner_prompt_settings:
    system_prompt_path: "src/clever_prover/prompts/structured_spec/system/StructuredSpecPlanner.md"
    example_prompt_path: "src/clever_prover/prompts/structured_spec/examples/StructuredSpecPlanner.md"
    max_tokens_per_action: 5000
    max_history_messages: 0
    end_tokens: ["[END]"]
  spec_planner_model_settings:
    model_name: "vllm:gpt-5.4-mini"
    secret_path: "./secret_template.json"
    temperature: 0.5
